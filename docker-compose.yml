version: "3.9"

services:
  # CLOUD COMPONENTS
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx_service
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    networks:
      - security_net

  camera_publisher_cam1:
    image: jrottenberg/ffmpeg:6.0-alpine
    container_name: camera_publisher_cam1
    restart: unless-stopped
    depends_on:
      - mediamtx
    command:
      - -re
      - -stream_loop
      - "-1"
      - -i
      - /videos/cam1.mp4
      - -c:v
      - libx264
      - -preset
      - ultrafast
      - -tune
      - zerolatency
      - -pix_fmt
      - yuv420p
      - -f
      - rtsp
      - -rtsp_transport
      - tcp
      - rtsp://mediamtx:8554/camera1
    volumes:
      - ./video:/videos:ro
    networks:
      - security_net

  camera_publisher_cam2:
    image: jrottenberg/ffmpeg:6.0-alpine
    container_name: camera_publisher_cam2
    restart: unless-stopped
    depends_on:
      - mediamtx
    command:
      - -re
      - -stream_loop
      - "-1"
      - -i
      - /videos/cam2.mp4
      - -c:v
      - libx264
      - -preset
      - ultrafast
      - -tune
      - zerolatency
      - -pix_fmt
      - yuv420p
      - -f
      - rtsp
      - -rtsp_transport
      - tcp
      - rtsp://mediamtx:8554/camera2
    volumes:
      - ./video:/videos:ro
    networks:
      - security_net

  postgres:
    image: postgres:16
    container_name: postgres_service
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-security_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - security_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-security_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq_service
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - security_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./cloud/backend_service/backend
    container_name: backend_service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./cloud/backend_service/backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-security_db}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
    networks:
      - security_net

  ai_service:
    build:
      context: ./cloud/ai_model_service
    container_name: ai_model_service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./cloud/ai_model_service:/app
    ports:
      - "5000:5000"
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      BACKEND_API_URL: http://backend:8000
      EVIDENCE_PUBLIC_BASE_URL: http://localhost:5000
    networks:
      - security_net

  # LOCAL COMPONENTS
  frame_extractor:
    build:
      context: ./local/frame_extractor_service
    container_name: frame_extractor_service
    restart: unless-stopped
    depends_on:
      - ai_service
      - mediamtx
    volumes:
      - ./local/frame_extractor_service:/app
    ports:
      - "8100:8100"
    environment:
      AI_SERVICE_URL: http://ai_service:5000/api/v1/detect
    networks:
      - security_net

  frontend:
    build:
      context: ./local/frontend_service/frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_FRAME_API_URL: ${VITE_FRAME_API_URL:-http://localhost:8100}
        VITE_MEDIA_MTX_HLS_URL: ${VITE_MEDIA_MTX_HLS_URL:-http://localhost:8888}
        VITE_MEDIA_MTX_WEBRTC_URL: ${VITE_MEDIA_MTX_WEBRTC_URL:-http://localhost:8889}
        VITE_WS_EVENTS_URL: ${VITE_WS_EVENTS_URL:-}
    container_name: frontend_service
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_FRAME_API_URL: http://localhost:8100
      VITE_MEDIA_MTX_HLS_URL: http://localhost:8888
      VITE_MEDIA_MTX_WEBRTC_URL: http://localhost:8889
      VITE_WS_EVENTS_URL: ws://localhost:8000/ws/events
    networks:
      - security_net

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  security_net:
    driver: bridge

