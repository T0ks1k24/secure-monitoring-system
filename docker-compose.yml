services:
  postgres:
    image: postgres:16
    container_name: security_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: security_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - security_net

  backend:
    build:
      context: ./backend
    container_name: security_backend
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/security_db
    volumes:
      - ./backend:/app
    networks:
      - security_net
    command: uv run python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

networks:
  security_net:
