version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: security_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: security_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - security_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: security_backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/security_db
    networks:
      - security_net

volumes:
  postgres_data:

networks:
  security_net:
