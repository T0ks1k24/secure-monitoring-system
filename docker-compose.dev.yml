version: "3.9"

# Dev compose — всі сервіси в одному стеку для локального тестування.
# Запуск: docker compose -f docker-compose.dev.yml up -d
# Логи:   docker compose -f docker-compose.dev.yml logs -f
# Стоп:   docker compose -f docker-compose.dev.yml down

services:
  # ── Infrastructure ────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: dev_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-security_db}
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    networks:
      - dev_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-security_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: dev_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI: http://localhost:15672
    volumes:
      - dev_rabbitmq_data:/var/lib/rabbitmq
    networks:
      - dev_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: dev_mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
    networks:
      - dev_net

  # ── Cloud services ────────────────────────────────────────
  backend:
    build:
      context: ./cloud/backend_service/backend
    container_name: dev_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-security_db}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
    networks:
      - dev_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  ai_service:
    build:
      context: ./cloud/ai_model_service
    container_name: dev_ai_service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672/
      BACKEND_API_URL: http://backend:8000
    networks:
      - dev_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Local services ────────────────────────────────────────
  frame_extractor:
    build:
      context: ./local/frame_extractor_service
    container_name: dev_frame_extractor
    restart: unless-stopped
    depends_on:
      ai_service:
        condition: service_healthy
    ports:
      - "8100:8100"
    environment:
      AI_SERVICE_URL: http://ai_service:5000/api/v1/detect
    networks:
      - dev_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./local/frontend_service/frontend
    container_name: dev_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frame_extractor:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - dev_net

volumes:
  dev_postgres_data:
  dev_rabbitmq_data:

networks:
  dev_net:
    driver: bridge
