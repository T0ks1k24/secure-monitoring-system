<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Security System</title>

  
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div id="titlebar">
    <div class="title">Security System</div>
    <div class="buttons">
      <button id="minimize">—</button>
      <button id="maximize">☐</button>
      <button id="close">✕</button>
    </div>
  </div>

  <header class="top-bar">
    <h1>Події безпеки</h1>
    <div class="risk">
      Рівень ризику:
      <span id="risk" class="risk-low">LOW</span>
    </div>
  </header>

  
  <main class="container">

    
    <section class="video-section">
      <h2>Відео</h2>

      <div class="video-wrapper">
        <img
          id="video"
          src="http://127.0.0.1:8000/video"
          alt="Video stream"
        />
      </div>
    </section>

    
    <aside class="control-panel">
      <h2>Керування</h2>

      <button class="start-btn" onclick="startEvents()">
        Почати моніторинг
      </button>

      <h3>Події</h3>
      <ul id="events"></ul>
    </aside>

  </main>

  <script src="script.js"></script>
</body>
</html>
