version: "3.9"

services:
  frame_extractor:
    build:
      context: ./local/frame_extractor_service
    container_name: frame_extractor_service
    restart: unless-stopped
    ports:
      - "8100:8100"
    environment:
      # URL of the AI service - set to your cloud server IP/domain in .env
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://localhost:5000/api/v1/detect}
    networks:
      - security_local_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./local/frontend_service/frontend
    container_name: frontend_service
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      # URL of the backend - set to your cloud server IP/domain in .env
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    networks:
      - security_local_net

networks:
  security_local_net:
    driver: bridge
